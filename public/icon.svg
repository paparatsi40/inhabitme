<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#brandGradient)"/>
  
  <!-- House shape -->
  <path d="M 30 45 L 50 30 L 70 45 L 70 70 L 30 70 Z" fill="white" stroke="none"/>
  
  <!-- Roof -->
  <path d="M 25 45 L 50 25 L 75 45" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Door -->
  <rect x="44" y="55" width="12" height="15" fill="url(#brandGradient)" rx="1"/>
  
  <!-- WiFi waves (remote work symbol) -->
  <path d="M 42 40 Q 50 35 58 40" fill="none" stroke="url(#brandGradient)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 38 43 Q 50 33 62 43" fill="none" stroke="url(#brandGradient)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
